<section class="section" id="jobs">
  <div class="container jobs">
    <div class="section-box">
      <div class="about-title mb-5" data-animate="slideInUp" data-animate-duration="1000">
        <h3 class="e-font section-title">
          <span class="code-font n-section-title">02.</span>
          {{ "Experience.Title" | translate }}
        </h3>
      </div>
      <div class="jobs-tabs" data-animate="fadeInUp" data-animate-duration="600" data-animate-delay="300">
        <ul class="jobs-tab-list" role="tablist">
          <li *ngFor="let job of jobs; let i = index" role="presentation"
            data-animate="scaleIn" [attr.data-animate-delay]="100 + (i * 150)">
            <button type="button" role="tab" class="jobs-tab" [class.active]="active === i"
              [attr.aria-selected]="active === i" (click)="active = i">
              {{ job.Tab }}
            </button>
          </li>
        </ul>
        <div class="jobs-tab-panel" role="tabpanel" *ngIf="jobs[active] as job">
          <h4 class="title-tab-content">
            {{ job.Title }} |
            <span class="company-tab-content">{{ job.Tab }}</span>
          </h4>
          <h5 class="job-time">{{ job.Date }}</h5>
          <p *ngFor="let jobDescriptionParagraph of job.Description; let i = index" class="job-description"
            [innerHTML]="jobDescriptionParagraph | translate" data-animate="fadeInLeft"
            [attr.data-animate-delay]="i * 100"></p>
        </div>
      </div>
    </div>
  </div>
</section>
